<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central de Relatórios</title>
  <link rel="stylesheet" href="static/styles.css" />
</head>
<body>

  <button id="theme-toggle" onclick="toggleTema()">🌙</button>

  <header>
    <div class="logo-bar">
      <img class="logo-img" src="static/logo_mg.png" alt="MG">
    </div>
    <h1>Central de Relatórios</h1>
    <div class="divider"></div>
  </header>

  <main class="cards-container">

    <a class="card active" href="https://controladoria-mg.github.io/Portal-dos-chamados/" target="_blank">
      <h2>Portal de Chamados</h2>
      <p>Clique para ver o relatório</p>
    </a>

    <a class="card active" href="https://gamaral99.github.io/Acompanhamento-de-Pendencias/" target="_blank">
      <h2>Controle de Tarefas</h2>
      <p>Clique para ver o relatório</p>
    </a>

    <a class="card active" href="https://controladoria-mg.github.io/Tarefas-baixadas/" target="_blank">
      <h2>Tarefas Baixadas</h2>
      <p>Clique para ver o relatório</p>
    </a>

    <div class="card disabled">
      <h2>Controle de Fechamento</h2>
      <p>Em breve</p>
    </div>

  </main>

  <script src="static/script.js"></script>
</body>
</html>
